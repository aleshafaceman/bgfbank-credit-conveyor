<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БЖФ Банк · Мобильный менеджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .phone-frame { width: 375px; height: 812px; background: #f0f4f8; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1a2e, 0 0 0 10px #333, 0 20px 60px rgba(0,0,0,0.5); }
        .phone-notch { width: 150px; height: 28px; background: #1a1a2e; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
        .phone-screen { height: 100%; overflow-y: auto; padding: 40px 16px 16px; display: flex; flex-direction: column; }
        .phone-screen::-webkit-scrollbar { display: none; }

        .screen { display: none; }
        .screen.active { display: block; }

        .m-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .m-logo { background: #003b6f; color: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
        .m-header h1 { font-size: 14px; color: #003b6f; }
        .m-header p { font-size: 10px; color: #7e9bb6; }
        .m-stats { display: flex; gap: 10px; flex: 1; justify-content: flex-end; font-size: 10px; }
        .m-stat { text-align: center; }
        .m-stat b { display: block; font-size: 18px; color: #003b6f; }

        .m-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); cursor: pointer; }
        .m-card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .m-card-id { font-weight: 700; font-size: 13px; color: #003b6f; }
        .m-card-date { font-size: 10px; color: #94a3b8; }
        .m-card-client { font-size: 12px; color: #64748b; }
        .m-card-amount { font-weight: 700; font-size: 14px; color: #1e293b; }
        .m-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; }
        .m-badge-new { background: #dbeafe; color: #1e40af; }
        .m-badge-processing { background: #fef3c7; color: #92400e; }
        .m-badge-valuation { background: #ede9fe; color: #5b21b6; }
        .m-badge-decision { background: #fce7f3; color: #9d174d; }
        .m-badge-approved { background: #d1fae5; color: #065f46; }
        .m-badge-rejected { background: #fee2e2; color: #991b1b; }

        .m-btn { display: block; width: 100%; padding: 11px; border-radius: 10px; font-weight: 700; font-size: 12px; text-align: center; cursor: pointer; border: none; }
        .m-btn-primary { background: #003b6f; color: white; }
        .m-btn-outline { background: white; border: 1px solid #cbd5e1; color: #64748b; margin-top: 6px; }
        .m-btn-success { background: #10b981; color: white; }
        .m-btn-danger { background: #ef4444; color: white; }
        .m-btn-warning { background: #f59e0b; color: white; }

        .m-filter { display: flex; gap: 8px; margin-bottom: 12px; }
        .m-filter select, .m-filter input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 12px; background: white; }
        .m-filter input::placeholder { color: #94a3b8; }

        .m-detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        .m-detail-label { color: #7e9bb6; }
        .m-detail-value { font-weight: 600; color: #1e293b; }
        .m-doc-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 11px; }

        .m-back { display: flex; align-items: center; gap: 6px; color: #003b6f; font-weight: 600; font-size: 13px; cursor: pointer; margin-bottom: 12px; }

        .nav-bar { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #e1e9f1; background: white; margin-top: auto; border-radius: 0 0 40px 40px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: #003b6f; }
        .nav-item i { font-size: 18px; }

        .client-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: #f8fbff; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        .client-avatar { width: 40px; height: 40px; border-radius: 50%; background: #003b6f; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .client-info { flex: 1; }
        .client-name { font-weight: 700; font-size: 13px; color: #1e293b; }
        .client-phone { font-size: 11px; color: #64748b; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .info-item { background: #f8fbff; border-radius: 8px; padding: 8px 10px; }
        .info-label { font-size: 9px; color: #7e9bb6; text-transform: uppercase; }
        .info-value { font-size: 12px; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen" id="phoneScreen">

        <!-- ГЛАВНЫЙ ЭКРАН: ЗАЯВКИ -->
        <div class="screen active" id="scr-applications">
            <div class="m-header">
                <div class="m-logo">Б</div>
                <div><h1>БЖФ БАНК</h1><p>Елена Смирнова · Менеджер</p></div>
                <div class="m-stats">
                    <div class="m-stat"><b id="mActive">4</b>активных</div>
                    <div class="m-stat"><b id="mPending">2</b>новых</div>
                </div>
            </div>
            <div class="m-filter">
                <select id="mFilter" onchange="filterApps()">
                    <option value="all">Все статусы</option><option value="new">Новые</option><option value="processing">В обработке</option><option value="valuation">На оценке</option><option value="decision">Решение</option><option value="approved">Одобрено</option><option value="rejected">Отказ</option>
                </select>
            </div>
            <div id="mAppList"></div>
        </div>

        <!-- ЭКРАН: ДЕТАЛИ ЗАЯВКИ -->
        <div class="screen" id="scr-detail">
            <div class="m-back" onclick="showScreen('applications')"><i class="fas fa-arrow-left"></i> К списку</div>
            <div id="mDetailContent"></div>
        </div>

        <!-- ЭКРАН: КЛИЕНТЫ -->
        <div class="screen" id="scr-clients">
            <div class="m-header"><div><h1 style="font-size:16px;">Клиенты</h1></div></div>
            <input type="text" id="clientSearchMob" placeholder="Поиск по имени..." style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px;font-size:12px;margin-bottom:12px;" oninput="filterClientsMob()">
            <div id="mClientList"></div>
        </div>

        <!-- ЭКРАН: ПРОФИЛЬ КЛИЕНТА -->
        <div class="screen" id="scr-client-profile">
            <div class="m-back" onclick="showScreen('clients')"><i class="fas fa-arrow-left"></i> К клиентам</div>
            <div id="mClientProfile"></div>
        </div>

        <!-- ЭКРАН: ЧАТ -->
        <div class="screen" id="scr-chat">
            <div class="m-back" onclick="showScreen('applications')"><i class="fas fa-arrow-left"></i> Назад</div>
            <div id="mChatContent"></div>
        </div>

        <!-- ЭКРАН: ОТЧЁТЫ -->
        <div class="screen" id="scr-reports">
            <div class="m-header"><div><h1 style="font-size:16px;">Отчёты</h1></div></div>
            <div id="mReportsContent"></div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <div class="nav-bar">
            <div class="nav-item active" onclick="showScreen('applications')"><i class="fas fa-list-ul"></i> Заявки</div>
            <div class="nav-item" onclick="showScreen('clients')"><i class="fas fa-users"></i> Клиенты</div>
            <div class="nav-item" onclick="showScreen('chat')"><i class="fas fa-comment-dots"></i> Чат</div>
            <div class="nav-item" onclick="showScreen('reports')"><i class="fas fa-chart-bar"></i> Отчёты</div>
        </div>
    </div>
</div>

<script>
// ========== ДАННЫЕ ==========
var apps = [
    { id:'4421-И', client:'Александр Кузнецов', phone:'+7 (999) 123-45-67', amount:5000000, term:15, status:'valuation', slabel:'На оценке', date:'15.06.2026', cadr:'Крылатская, 15', cval:8500000, rate:null, pay:null, docs:[{n:'2-НДФЛ',ok:true},{n:'Паспорт',ok:true},{n:'ЕГРН',ok:false}] },
    { id:'4450-И', client:'Мария Петрова', phone:'+7 (916) 555-44-33', amount:8000000, term:20, status:'new', slabel:'Новая', date:'16.06.2026', cadr:'Тверская, 20', cval:14200000, rate:null, pay:null, docs:[{n:'2-НДФЛ',ok:false},{n:'Паспорт',ok:true},{n:'ЕГРН',ok:false}] },
    { id:'3890-И', client:'Александр Кузнецов', phone:'+7 (999) 123-45-67', amount:4200000, term:15, status:'approved', slabel:'Одобрено', date:'03.02.2026', cadr:'Крылатская, 15', cval:8500000, rate:12.8, pay:48300, docs:[{n:'2-НДФЛ',ok:true},{n:'Паспорт',ok:true},{n:'ЕГРН',ok:true}] },
    { id:'4460-И', client:'Сергей Волков', phone:'+7 (925) 777-88-99', amount:3500000, term:7, status:'processing', slabel:'В обработке', date:'16.06.2026', cadr:'Химки, Маяковского, 8', cval:5100000, rate:null, pay:null, docs:[{n:'2-НДФЛ',ok:true},{n:'Паспорт',ok:true},{n:'ЕГРН',ok:true}] },
    { id:'3701-И', client:'Дмитрий Иванов', phone:'+7 (903) 111-22-33', amount:6000000, term:10, status:'rejected', slabel:'Отказ', date:'12.11.2025', cadr:'Ленина, 30', cval:7800000, rate:null, pay:null, docs:[{n:'2-НДФЛ',ok:true},{n:'Паспорт',ok:true},{n:'ЕГРН',ok:true}] }
];
var bc = { new:'m-badge-new', processing:'m-badge-processing', valuation:'m-badge-valuation', decision:'m-badge-decision', approved:'m-badge-approved', rejected:'m-badge-rejected' };

// ========== КЛИЕНТЫ (агрегация) ==========
function getClients() {
    var clients = {};
    apps.forEach(function(a) {
        if (!clients[a.client]) {
            clients[a.client] = {
                name: a.client, phone: a.phone, email: a.client.split(' ')[0].toLowerCase()+'@mail.ru',
                address: a.cadr, passport: '4510 123456', birthDate: '15.06.1985', source: 'esia',
                workplace: 'ООО «ТехноСофт»', position: 'Руководитель отдела', income: 180000, experience: '3-5',
                applications: [], properties: [{ address: a.cadr, type: 'Квартира', area: 65, valuation: a.cval }]
            };
        }
        clients[a.client].applications.push(a);
    });
    return clients;
}

// ========== ЭКРАНЫ ==========
function showScreen(screen) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('scr-' + screen).classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    var navMap = { applications: 0, clients: 1, chat: 2, reports: 3 };
    if (navMap[screen] !== undefined) {
        document.querySelectorAll('.nav-item')[navMap[screen]].classList.add('active');
    }
    
    if (screen === 'applications') { renderList(); updateStats(); }
    if (screen === 'clients') renderClientList();
    if (screen === 'chat') renderChatListMob();
    if (screen === 'reports') renderReportsMob();
}

// ========== ЗАЯВКИ ==========
function renderList(f) {
    var list = f || apps;
    document.getElementById('mAppList').innerHTML = list.map(function(a) {
        return '<div class="m-card" onclick="openDetail(\''+a.id+'\')"><div class="m-card-row"><span class="m-card-id">№'+a.id+'</span><span class="m-card-date">'+a.date+'</span></div><div class="m-card-client">'+a.client+'</div><div class="m-card-row"><span class="m-card-amount">'+a.amount.toLocaleString('ru-RU')+' ₽</span><span class="m-badge '+bc[a.status]+'">'+a.slabel+'</span></div></div>';
    }).join('');
}
function filterApps() {
    var s = document.getElementById('mFilter').value;
    renderList(s === 'all' ? apps : apps.filter(function(a) { return a.status === s; }));
}

function openDetail(id) {
    var a = apps.find(function(x) { return x.id === id; }); if (!a) return;
    var h = '';
    h += '<div class="m-card"><div class="m-card-row"><span class="m-card-id">№'+a.id+'</span><span class="m-badge '+bc[a.status]+'">'+a.slabel+'</span></div><div style="font-size:14px;font-weight:600;margin:6px 0;">'+a.client+'</div><div style="font-size:11px;color:#94a3b8;">'+a.phone+'</div></div>';
    h += '<div class="m-card"><div class="m-detail-row"><span class="m-detail-label">Сумма</span><span class="m-detail-value">'+a.amount.toLocaleString('ru-RU')+' ₽</span></div><div class="m-detail-row"><span class="m-detail-label">Срок</span><span class="m-detail-value">'+a.term+' лет</span></div><div class="m-detail-row"><span class="m-detail-label">Ставка</span><span class="m-detail-value" style="color:'+(a.rate?'#1e293b':'#94a3b8')+'">'+(a.rate?a.rate+'%':'ожидается')+'</span></div><div class="m-detail-row"><span class="m-detail-label">Объект</span><span class="m-detail-value" style="font-size:11px;">'+a.cadr+' · '+a.cval.toLocaleString('ru-RU')+' ₽</span></div></div>';
    h += '<div class="m-card"><div style="font-weight:700;font-size:12px;color:#003b6f;margin-bottom:6px;">Документы</div>'+a.docs.map(function(d){return '<div class="m-doc-item"><i class="fas '+(d.ok?'fa-check-circle':'fa-times-circle')+'" style="color:'+(d.ok?'#10b981':'#ef4444')+';"></i>'+d.n+' · '+(d.ok?'Загружен':'Отсутствует')+'</div>';}).join('')+'</div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">' + getBtns(a) + '</div>';
    h += '<button class="m-btn m-btn-outline" style="margin-top:6px;" onclick="openClientProfileMob(\''+a.client+'\')"><i class="fas fa-user"></i> Профиль клиента</button>';
    document.getElementById('mDetailContent').innerHTML = h;
    showScreen('detail');
}
function getBtns(a) {
    var btns = {
        new: '<button class="m-btn m-btn-primary" onclick="act(\''+a.id+'\',\'review\')">Начать рассмотрение</button><button class="m-btn m-btn-outline" onclick="act(\''+a.id+'\',\'docs\')">Запросить документы</button>',
        processing: '<button class="m-btn m-btn-warning" onclick="act(\''+a.id+'\',\'scoring\')">Запустить прескоринг</button>',
        valuation: '<button class="m-btn m-btn-warning" onclick="act(\''+a.id+'\',\'val\')">Запросить оценку</button>',
        decision: '<button class="m-btn m-btn-success" onclick="act(\''+a.id+'\',\'approve\')">Одобрить</button><button class="m-btn m-btn-danger" onclick="act(\''+a.id+'\',\'reject\')">Отклонить</button>',
        approved: '<button class="m-btn m-btn-outline" onclick="alert(\'Договор отправлен\')">Отправить договор</button>',
        rejected: '<button class="m-btn m-btn-outline" onclick="alert(\'Клиент уведомлён\')">Предложить изменения</button>'
    };
    return btns[a.status] || '';
}
function act(id, action) {
    var a = apps.find(function(x){return x.id===id;}); if (!a) return;
    if (action==='review') { a.status='processing'; a.slabel='В обработке'; }
    if (action==='docs') { alert('Клиенту отправлен запрос документов'); }
    if (action==='scoring') { a.status='valuation'; a.slabel='На оценке'; renderList(); updateStats(); setTimeout(function(){ a.status='decision'; a.slabel='Решение'; a.rate=12.5; a.pay=Math.round(a.amount*(12.5/100)/12/(1-Math.pow(1+(12.5/100)/12,-a.term*12))); renderList(); updateStats(); },2000); }
    if (action==='val') { var nv=Math.round(a.cval*(0.93+Math.random()*0.14)); alert('Оценка: '+nv.toLocaleString('ru-RU')+' ₽'); a.cval=nv; }
    if (action==='approve') { a.status='approved'; a.slabel='Одобрено'; if(!a.rate){a.rate=12.5;a.pay=Math.round(a.amount*(12.5/100)/12/(1-Math.pow(1+(12.5/100)/12,-a.term*12)));} alert('Заявка одобрена!'); }
    if (action==='reject') { var r=prompt('Причина:'); if(r){a.status='rejected';a.slabel='Отказ';alert('Заявка отклонена');} }
    renderList(); updateStats(); openDetail(id);
}
function updateStats() {
    document.getElementById('mActive').textContent = apps.filter(function(a){return a.status!=='approved'&&a.status!=='rejected';}).length;
    document.getElementById('mPending').textContent = apps.filter(function(a){return a.status==='new'||a.status==='processing';}).length;
}

// ========== КЛИЕНТЫ ==========
function renderClientList() {
    var clients = getClients();
    var list = Object.values(clients);
    document.getElementById('mClientList').innerHTML = list.map(function(c) {
        return '<div class="client-item" onclick="openClientProfileMob(\''+c.name+'\')"><div class="client-avatar">'+c.name.split(' ').map(function(w){return w[0];}).join('')+'</div><div class="client-info"><div class="client-name">'+c.name+'</div><div class="client-phone">'+c.phone+'</div></div><div style="font-size:12px;color:#94a3b8;">'+c.applications.length+' заявок</div></div>';
    }).join('');
}
function filterClientsMob() {
    var q = document.getElementById('clientSearchMob').value.toLowerCase();
    document.querySelectorAll('.client-item').forEach(function(item) {
        item.style.display = item.querySelector('.client-name').textContent.toLowerCase().indexOf(q) > -1 ? 'flex' : 'none';
    });
}
function openClientProfileMob(clientName) {
    var clients = getClients();
    var client = clients[clientName];
    if (!client) return;
    
    var allDocs = [];
    client.applications.forEach(function(a) {
        a.docs.forEach(function(d) {
            if (!allDocs.find(function(x){return x.n===d.n;})) allDocs.push(d);
        });
    });
    
    var h = '';
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div style="width:48px;height:48px;border-radius:50%;background:#003b6f;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;">'+client.name.split(' ').map(function(w){return w[0];}).join('')+'</div><div><div style="font-weight:700;font-size:16px;">'+client.name+'</div><div style="font-size:12px;color:#94a3b8;">'+client.applications.length+' заявок</div></div></div>';
    
    h += '<div class="m-card"><div style="font-weight:700;font-size:12px;color:#003b6f;margin-bottom:8px;">Личные данные</div><div class="info-grid"><div class="info-item"><div class="info-label">Телефон</div><div class="info-value">'+client.phone+'</div></div><div class="info-item"><div class="info-label">Email</div><div class="info-value">'+client.email+'</div></div><div class="info-item"><div class="info-label">Паспорт</div><div class="info-value">'+client.passport+'</div></div><div class="info-item"><div class="info-label">Источник</div><div class="info-value">'+(client.source==='esia'?'Госуслуги':'Ручной')+'</div></div></div></div>';
    
    h += '<div class="m-card"><div style="font-weight:700;font-size:12px;color:#003b6f;margin-bottom:8px;">Заявки</div>'+client.applications.map(function(a){return '<div style="padding:8px 0;border-bottom:1px solid #f1f5f9;cursor:pointer;" onclick="showScreen(\'applications\');openDetail(\''+a.id+'\')"><div style="font-weight:600;font-size:12px;">№'+a.id+'</div><div style="font-size:10px;color:#94a3b8;">'+a.date+' · '+a.amount.toLocaleString('ru-RU')+' ₽</div></div>';}).join('')+'</div>';
    
    h += '<div class="m-card"><div style="font-weight:700;font-size:12px;color:#003b6f;margin-bottom:8px;">Документы</div>'+allDocs.map(function(d){return '<div class="m-doc-item"><i class="fas '+(d.ok?'fa-check-circle':'fa-times-circle')+'" style="color:'+(d.ok?'#10b981':'#ef4444')+';"></i>'+d.n+'</div>';}).join('')+'</div>';
    
    document.getElementById('mClientProfile').innerHTML = h;
    showScreen('client-profile');
}

// ========== ЧАТ ==========
function renderChatListMob() {
    var uniqueClients = [];
    apps.forEach(function(a) { if (uniqueClients.indexOf(a.client) === -1) uniqueClients.push(a.client); });
    document.getElementById('mChatContent').innerHTML = '<div style="font-weight:700;font-size:16px;color:#003b6f;margin-bottom:12px;">Диалоги</div>' + uniqueClients.map(function(c) {
        var a = apps.find(function(x){return x.client===c;});
        return '<div class="client-item" onclick="openChatMob(\''+c+'\')"><div class="client-avatar">'+c.split(' ').map(function(w){return w[0];}).join('')+'</div><div class="client-info"><div class="client-name">'+c+'</div><div class="client-phone">'+(a?a.slabel:'')+'</div></div></div>';
    }).join('');
}
function openChatMob(clientName) {
    var a = apps.find(function(x){return x.client===clientName;});
    var h = '';
    h += '<div style="font-weight:700;font-size:14px;color:#003b6f;margin-bottom:4px;">'+clientName+'</div><div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">'+(a?a.phone:'')+'</div>';
    h += '<div style="background:white;border-radius:14px;padding:14px;margin-bottom:10px;min-height:300px;">';
    h += '<div style="text-align:right;margin-bottom:8px;"><div style="display:inline-block;background:#003b6f;color:white;padding:8px 12px;border-radius:12px;font-size:12px;max-width:80%;">Здравствуйте! Какие документы нужны?</div></div>';
    h += '<div style="text-align:left;margin-bottom:8px;"><div style="display:inline-block;background:white;border:1px solid #e1e9f1;padding:8px 12px;border-radius:12px;font-size:12px;max-width:80%;">Подойдёт 2-НДФЛ или справка по форме банка.</div></div>';
    h += '</div>';
    h += '<div style="display:flex;gap:8px;"><input type="text" placeholder="Сообщение..." style="flex:1;padding:10px;border:1px solid #cbd5e1;border-radius:10px;font-size:12px;"><button style="width:40px;height:40px;border-radius:50%;background:#003b6f;color:white;border:none;"><i class="fas fa-paper-plane"></i></button></div>';
    document.getElementById('mChatContent').innerHTML = h;
}

// ========== ОТЧЁТЫ ==========
function renderReportsMob() {
    var total = apps.length;
    var approved = apps.filter(function(a){return a.status==='approved';}).length;
    var rejected = apps.filter(function(a){return a.status==='rejected';}).length;
    var inProgress = total - approved - rejected;
    var avgAmount = Math.round(apps.reduce(function(s,a){return s+a.amount;},0)/total);
    document.getElementById('mReportsContent').innerHTML = 
        '<div class="m-card" style="text-align:center;"><div style="font-size:40px;font-weight:800;color:#003b6f;">'+total+'</div><div>Всего заявок</div></div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+
        '<div class="m-card" style="text-align:center;"><div style="font-size:32px;font-weight:800;color:#10b981;">'+approved+'</div><div style="font-size:11px;">Одобрено</div></div>'+
        '<div class="m-card" style="text-align:center;"><div style="font-size:32px;font-weight:800;color:#ef4444;">'+rejected+'</div><div style="font-size:11px;">Отказы</div></div>'+
        '<div class="m-card" style="text-align:center;"><div style="font-size:32px;font-weight:800;color:#f59e0b;">'+inProgress+'</div><div style="font-size:11px;">В обработке</div></div>'+
        '<div class="m-card" style="text-align:center;"><div style="font-size:24px;font-weight:800;color:#003b6f;">'+avgAmount.toLocaleString('ru-RU')+' ₽</div><div style="font-size:11px;">Средняя сумма</div></div>'+
        '</div>';
}

// СТАРТ
renderList();
updateStats();
</script>
